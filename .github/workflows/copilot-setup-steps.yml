name: Copilot Workspace Setup Steps

on:
  workspace-setup:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install system libraries for R and spatial packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libfontconfig1-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages for FishSET
        run: |
          Rscript -e 'install.packages(c(
            "tidyverse",      # Data manipulation/plotting
            "sf",            # Spatial
            "sp",            # Spatial
            "data.table",    # Data wrangling
            "rmarkdown",     # Reporting
            "shiny",         # Interactive apps (if used)
            "devtools"       # For development
          ), repos="https://cran.rstudio.com")'

      # OPTIONAL: Install JavaScript/HTML dependencies if needed for vignettes or docs
      # - name: Set up Node.js and install JS packages
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - run: npm install --prefix ./path-to-your-js

      - name: Confirm R and package install
        run: |
          Rscript -e 'sessionInfo()'
